<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparalSound - Pitch Detector</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-top: 50px; }
        #note { font-size: 8em; font-weight: bold; color: #00f2ff; margin: 20px 0; }
        #freq { font-size: 1.5em; color: #888; }
        #meter-container { width: 80%; height: 20px; background: #333; margin: 30px auto; border-radius: 10px; overflow: hidden; }
        #meter-bar { width: 0%; height: 100%; background: #00f2ff; transition: width 0.1s; }
        button { padding: 20px 40px; font-size: 1.5em; cursor: pointer; background: #00f2ff; border: none; border-radius: 50px; font-weight: bold; }
        #status { margin-top: 20px; color: #ffeb3b; }
    </style>
</head>
<body>

    <h1>SparalSound Pitch Test</h1>
    
    <div id="note">--</div>
    <div id="freq">0.00 Hz</div>

    <div id="meter-container">
        <div id="meter-bar"></div>
    </div>

    <button id="start-btn">마이크 시작</button>
    <div id="status">버튼을 눌러 마이크를 켜주세요.</div>

    <script src="https://cdn.jsdelivr.net/npm/pitchfinder@2.3.0/dist/pitchfinder.min.js"></script>

    <script>
        const noteEl = document.getElementById('note');
        const freqEl = document.getElementById('freq');
        const barEl = document.getElementById('meter-bar');
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('start-btn');

        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        async function initPitch() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                // pitchfinder 설정
                const detectPitch = pitchfinder.YIN({ sampleRate: audioContext.sampleRate });
                const buffer = new Float32Array(analyser.fftSize);

                btn.style.display = 'none';
                statusEl.innerText = "피아노를 쳐보세요!";

                function update() {
                    analyser.getFloatTimeDomainData(buffer);
                    
                    // 볼륨 계산 (게이지 표시용)
                    let sum = 0;
                    for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
                    const rms = Math.sqrt(sum / buffer.length);
                    barEl.style.width = Math.min(rms * 500, 100) + "%";

                    // 음정 감지
                    if (rms > 0.01) { // 일정 크기 이상의 소리만 분석
                        const pitch = detectPitch(buffer);
                        if (pitch) {
                            // 주파수를 MIDI 번호로 변환
                            const midi = Math.round(12 * Math.log2(pitch / 440) + 69);
                            const noteName = NOTE_NAMES[midi % 12];
                            const octave = Math.floor(midi / 12) - 1;

                            noteEl.innerText = noteName + octave;
                            freqEl.innerText = pitch.toFixed(2) + " Hz";
                        }
                    }
                    requestAnimationFrame(update);
                }

                update();

            } catch (err) {
                statusEl.innerText = "오류: " + err.message;
            }
        }

        btn.onclick = initPitch;
    </script>
</body>
</html>
