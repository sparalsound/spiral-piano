<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>승우 시우의 짜장 떡볶이 선택기</title>
    <style>
        body {
            background: #1a1a2e; /* 깊은 밤하늘 느낌 */
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Black Han Sans', sans-serif; /* 굵고 힘있는 폰트 추천 */
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.3;
        }

        .slot-machine {
            background: #0f3460;
            width: 85vw;
            max-width: 350px;
            height: 180px;
            border: 10px solid #e94560;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            position: relative;
        }

        .slot-window {
            font-size: 3.5rem;
            font-weight: 900;
            transition: 0.1s;
        }

        .neon-buy { color: #00ff41; text-shadow: 0 0 25px #00ff41; }
        .neon-skip { color: #9e9e9e; text-shadow: 0 0 10px #ffffff; }

        .controls { margin-top: 40px; }
        #lever-btn {
            background: #e94560;
            border: none;
            width: 140px;
            height: 70px;
            border-radius: 35px;
            font-weight: bold;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #952e3f;
            transition: 0.1s;
        }

        #lever-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #952e3f;
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, 2px); }
        }

        #final-msg {
            margin-top: 30px;
            font-size: 1.3rem;
            height: 3.5em;
            color: #ffffff;
            text-align: center;
            padding: 0 10px;
            font-weight: bold;
            line-height: 1.5;
        }

        .names {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="names">승우 ⭐ 시우</div>
    <h1>짜장 떡볶이<br>먹을 준비 됐나요?</h1>

    <div class="slot-machine" id="machine">
        <div class="slot-window" id="slot-text">???</div>
    </div>

    <div id="final-msg">버튼을 눌러 운명을 결정해봐!</div>

    <div class="controls">
        <button id="lever-btn">GO!!</button>
    </div>

    <script>
        const slotText = document.getElementById('slot-text');
        const leverBtn = document.getElementById('lever-btn');
        const machine = document.getElementById('machine');
        const finalMsg = document.getElementById('final-msg');

        const midOptions = ["지글지글", "슈퍼파워", "대박사건", "냠냠쩝쩝", "출발직전"];
        
        const buyMessages = [
            "🎉 예쓰! 오늘 메뉴는 짜장 떡볶이다!",
            "🚀 짜장 로켓 발사! 곧 도착합니다!",
            "👑 승우와 시우의 멋진 파티 타임!",
            "🍗 맛있는 떡볶이가 사달라고 외쳐요!",
            "🔥 역시 운명은 먹는 쪽을 선택했어!"
        ];

        let isSpinning = false;

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            machine.classList.add('shake');
            finalMsg.innerText = "과연 결과는...?!";
            leverBtn.disabled = true;

            let count = 0;
            const duration = 20; 
            
            const interval = setInterval(() => {
                slotText.innerText = midOptions[Math.floor(Math.random() * midOptions.length)];
                slotText.style.color = "#ffd700";
                
                count++;
                if (count > duration) {
                    clearInterval(interval);
                    stopSpin();
                }
            }, 80);
        }

        function stopSpin() {
            machine.classList.remove('shake');
            isSpinning = false;
            leverBtn.disabled = false;

            const result = Math.random() > 0.05 ? "사간다!" : "만다...";
            slotText.innerText = result;

            if (result === "사간다!") {
                slotText.className = "slot-window neon-buy";
                finalMsg.innerText = buyMessages[Math.floor(Math.random() * buyMessages.length)];
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
            } else {
                slotText.className = "slot-window neon-skip";
                finalMsg.innerText = "😲 엥? 안 사간다고?! \n한 번 더 눌러서 기회를 주자!";
                if (navigator.vibrate) navigator.vibrate(200);
            }
        }

        leverBtn.addEventListener('click', spin);
    </script>
</body>
</html>
