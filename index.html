<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이크 테스트</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif; }
        #meter { font-size: 3em; color: #0f0; margin: 20px 0; }
        button { padding: 20px 40px; font-size: 1.5em; cursor: pointer; }
        #log { color: #888; font-size: 0.9em; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>마이크 작동 테스트</h1>
    <p>아래 버튼을 누르고 마이크 허용을 해주세요.</p>
    
    <button id="btn">마이크 시작</button>

    <div id="meter">볼륨: 0.0000</div>
    <div id="status">대기 중...</div>
    <div id="log"></div>

    <script>
        const btn = document.getElementById('btn');
        const meter = document.getElementById('meter');
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        function addLog(msg) {
            log.innerHTML += msg + "<br>";
        }

        btn.onclick = async () => {
            addLog("버튼 클릭됨");
            try {
                // 1. 오디오 컨텍스트 생성
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                addLog("AudioContext 생성 성공");

                // 2. 마이크 권한 요청
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                addLog("마이크 스트림 획득 성공");

                status.innerText = "마이크 연결됨! 소리를 내보세요.";
                btn.style.display = "none";

                // 3. 소리 크기 분석기 연결
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                const dataArray = new Float32Array(analyser.fftSize);

                function checkVolume() {
                    analyser.getFloatTimeDomainData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i] * dataArray[i];
                    }
                    const rms = Math.sqrt(sum / dataArray.length);
                    
                    // 화면에 볼륨 표시
                    meter.innerText = "볼륨: " + rms.toFixed(4);
                    
                    requestAnimationFrame(checkVolume);
                }

                checkVolume();

            } catch (err) {
                addLog("오류 발생: " + err.name + " - " + err.message);
                status.innerText = "연결 실패";
                status.style.color = "red";
            }
        };
    </script>
</body>
</html>
