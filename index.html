<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SparalSound - Cyber Spiral</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000205; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0, 10, 20, 0.8); padding: 20px; border-radius: 15px; border: 1px solid #1a3a5a; pointer-events: none; z-index: 10; box-shadow: 0 0 20px rgba(0, 150, 255, 0.2); }
        #note-display { font-size: 3em; font-weight: 800; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        #status { font-size: 0.9em; color: #7f8c8d; margin-top: 10px; letter-spacing: 1px; }
        #volume-meter { font-size: 0.8em; color: #34495e; margin-top: 5px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #001529 0%, #000000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 15px; background: linear-gradient(45deg, #00f2ff, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #8a99a8; margin-bottom: 40px; }
        button { padding: 22px 50px; font-size: 1.3em; cursor: pointer; background: transparent; color: #00f2ff; border: 2px solid #00f2ff; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        button:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 20px #00f2ff; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="note-display">--</div>
        <div id="status">INITIALIZING...</div>
        <div id="volume-meter">SIGNAL: 0.0000</div>
    </div>

    <div id="overlay">
        <h1>SPARAL SOUND</h1>
        <p>The Geometry of 8-Octave Harmonics</p>
        <button id="start-btn">SYSTEM START</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pitchfinder@2.3.0/dist/pitchfinder.min.js"></script>

    <script>
        let scene, camera, renderer, controls, audioContext, analyser, pitchDetector;
        let isRunning = false;
        const notePoints = [];
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
        const MAX_OCTAVE = 8;
        const BOTTOM_RADIUS = 7;
        const HEIGHT_STEP = 3;

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000205, 0.01);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 20, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; // 자동으로 천천히 회전하게 하여 입체감을 더함
            controls.autoRotateSpeed = 0.5;
            controls.target.set(0, 10, 0);

            // 고깔 가이드라인 (더 선명하고 세련된 색상)
            const geometry = new THREE.CylinderGeometry(0.2, BOTTOM_RADIUS, MAX_OCTAVE * HEIGHT_STEP, 12, MAX_OCTAVE, true);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x1a3a5a, // 진한 블루 계열
                wireframe: true, 
                transparent: true, 
                opacity: 0.4 
            });
            const cone = new THREE.Mesh(geometry, material);
            cone.position.y = (MAX_OCTAVE * HEIGHT_STEP) / 2;
            scene.add(cone);

            // 보이지 않는 중심 축
            const axisGeom = new THREE.CylinderGeometry(0.05, 0.05, MAX_OCTAVE * HEIGHT_STEP, 8);
            const axisMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.1 });
            const axis = new THREE.Mesh(axisGeom, axisMat);
            axis.position.y = (MAX_OCTAVE * HEIGHT_STEP) / 2;
            scene.add(axis);

            scene.add(new THREE.AmbientLight(0x101010));
            const pl = new THREE.PointLight(0xffffff, 2);
            pl.position.set(20, 40, 20);
            scene.add(pl);
        }

        async function startApp() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true } 
                });
                
                document.getElementById('overlay').style.display = 'none';
                isRunning = true;
                document.getElementById('status').innerText = "SYSTEM ACTIVE";

                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                pitchDetector = pitchfinder.YIN({ sampleRate: audioContext.sampleRate });

                initThree();
                animate();
                updateAudio();
            } catch (err) {
                document.getElementById('status').innerText = "ERROR: MIC DENIED";
            }
        }

        function updateAudio() {
            if (!isRunning || !analyser) return;
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            
            let sum = 0;
            for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
            const rms = Math.sqrt(sum / buffer.length);

            document.getElementById('volume-meter').innerText = "SIGNAL: " + rms.toFixed(4);

            if (rms > 0.008) {
                const pitch = pitchDetector(buffer);
                if (pitch) {
                    const midi = Math.round(12 * Math.log2(pitch / 440) + 69);
                    const octave = Math.floor(midi / 12) - 1;
                    const noteIdx = midi % 12;

                    if (octave >= 0 && octave <= MAX_OCTAVE) {
                        document.getElementById('note-display').innerText = NOTE_NAMES[noteIdx] + octave;
                        const fifthIdx = CIRCLE_OF_FIFTHS.indexOf(noteIdx);
                        const angle = (fifthIdx * 30) * (Math.PI / 180);
                        const radius = BOTTOM_RADIUS * (1 - (octave / (MAX_OCTAVE + 1)) * 0.9);
                        
                        addPoint(radius * Math.sin(angle), octave * HEIGHT_STEP, radius * Math.cos(angle), noteIdx, rms);
                    }
                }
            }
            requestAnimationFrame(updateAudio);
        }

        function addPoint(x, y, z, idx, vol) {
            // 점 크기를 소리 크기에 따라 더 다이나믹하게 조절
            const size = Math.max(0.18, vol * 5.0);
            const geometry = new THREE.SphereGeometry(size, 20, 20);
            
            // 네온 색상 계산 (HSL 사용)
            const color = new THREE.Color().setHSL(idx / 12, 1, 0.5);
            
            const material = new THREE.MeshPhongMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 1.2, // 더 강렬하게 빛남
                transparent: true, 
                opacity: 1 
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            scene.add(sphere);

            notePoints.push({ mesh: sphere, mat: material, start: performance.now(), duration: 4000 }); // 4초간 유지
        }

        function animate() {
            if (!isRunning) return;
            requestAnimationFrame(animate);
            controls.update();
            const now = performance.now();
            for (let i = notePoints.length - 1; i >= 0; i--) {
                const p = notePoints[i];
                const elapsed = now - p.start;
                if (elapsed > p.duration) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    notePoints.splice(i, 1);
                } else if (elapsed > p.duration * 0.7) {
                    p.mat.opacity = (p.duration - elapsed) / (p.duration * 0.3);
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', startApp);
        window.addEventListener('touchstart', () => { if (audioContext) audioContext.resume(); });
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
