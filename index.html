<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SparalSound - Fixed Map Spiral</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000205; }
        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: sans-serif; touch-action: none; height: 100vh; }
        #ui-tuner { position: absolute; top: 20px; left: 0; width: 100%; text-align: center; z-index: 10; pointer-events: none; display: none; }
        #note { font-size: 5em; font-weight: 900; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 0; }
        #volume-ring { width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(0, 242, 255, 0.3); margin: 5px auto; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 22px 50px; font-size: 1.5em; cursor: pointer; background: var(--neon); border: none; border-radius: 50px; font-weight: bold; color: #000; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="ui-tuner"><div id="volume-ring"></div><p id="note">--</p></div>
    <div id="overlay">
        <h1 style="color:var(--neon)">SPARAL SOUND</h1>
        <p style="color:#666">Fixed Harmonic Map System</p>
        <button id="start-btn">SYSTEM START</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
        
        let scene, camera, renderer, controls, audioContext, analyser, buffer, isRunning = false;
        const activePoints = [];

        // 텍스트 라벨 생성을 위한 캔버스 텍스처 함수
        function createTextCanvas(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 64; canvas.height = 64;
            ctx.fillStyle = 'white';
            ctx.font = 'Bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text, 32, 45);
            return new THREE.CanvasTexture(canvas);
        }

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length, rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.015) return { rms, pitch: -1 };

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            buf = buf.slice(r1, r2); SIZE = buf.length;

            let c = new Float32Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            return { rms, pitch: sampleRate / maxpos };
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 20, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 12, 0);

            // 1. 고깔 가이드 (흰색)
            const cone = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 9, 34, 12, 12, true),
                new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 })
            );
            cone.position.y = 17;
            scene.add(cone);

            // 2. [핵심] 고정된 음정 가이드 맵 생성
            for (let oct = 0; oct <= 8; oct++) {
                for (let i = 0; i < 12; i++) {
                    const noteIdx = i;
                    const fifthIdx = CIRCLE_OF_FIFTHS.indexOf(noteIdx);
                    const angle = (fifthIdx * 30) * (Math.PI / 180);
                    const radius = 9 * (1 - (oct / 10));
                    const x = radius * Math.sin(angle);
                    const y = oct * 4;
                    const z = radius * Math.cos(angle);

                    // 작은 회색 점 (고정)
                    const dot = new THREE.Mesh(
                        new THREE.SphereGeometry(0.1, 4, 4),
                        new THREE.MeshBasicMaterial({ color: 0x444444 })
                    );
                    dot.position.set(x, y, z);
                    scene.add(dot);

                    // 음 이름 라벨 (고정)
                    const spriteMat = new THREE.SpriteMaterial({ map: createTextCanvas(NOTE_NAMES[noteIdx]) });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.position.set(x * 1.05, y, z * 1.05); // 점보다 살짝 바깥쪽
                    sprite.scale.set(0.6, 0.6, 0.6);
                    scene.add(sprite);
                }
            }
        }

        function triggerActivePoint(x, y, z, noteIdx, vol) {
            const size = Math.max(0.4, vol * 7);
            const color = new THREE.Color().setHSL(CIRCLE_OF_FIFTHS.indexOf(noteIdx) / 12, 1, 0.5);
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(size, 8, 8),
                new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 })
            );
            sphere.position.set(x, y, z);
            scene.add(sphere);
            activePoints.push({ mesh: sphere, mat: sphere.material, start: performance.now() });
        }

        function animate() {
            if (!isRunning) return;
            requestAnimationFrame(animate);

            analyser.getFloatTimeDomainData(buffer);
            const res = autoCorrelate(buffer, audioContext.sampleRate);
            document.getElementById('volume-ring').style.transform = `scale(${0.8 + Math.min(res.rms * 2, 0.6)})`;

            if (res.pitch !== -1 && res.pitch < 4000) {
                const midi = Math.round(12 * Math.log2(res.pitch / 440) + 69);
                const noteIdx = midi % 12, octave = Math.floor(midi / 12) - 1;

                if (octave >= 0 && octave <= 8) {
                    document.getElementById('note').innerText = NOTE_NAMES[noteIdx] + octave;
                    const angle = (CIRCLE_OF_FIFTHS.indexOf(noteIdx) * 30) * (Math.PI / 180);
                    const radius = 9 * (1 - (octave / 10));
                    triggerActivePoint(radius * Math.sin(angle), octave * 4, radius * Math.cos(angle), noteIdx, res.rms);
                }
            }

            const now = performance.now();
            for (let i = activePoints.length - 1; i >= 0; i--) {
                const age = now - activePoints[i].start;
                if (age > 2000) {
                    scene.remove(activePoints[i].mesh);
                    activePoints.splice(i, 1);
                } else if (age > 1200) {
                    activePoints[i].mat.opacity = (2000 - age) / 800;
                }
            }
            controls.update();
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                buffer = new Float32Array(analyser.fftSize);
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('ui-tuner').style.display = 'block';
                initThree();
                isRunning = true;
                animate();
            } catch (err) { alert("마이크 권한 필요"); }
        };
    </script>
</body>
</html>
