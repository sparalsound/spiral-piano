<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>8옥타브 5도권 고깔 튜너</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; pointer-events: none; }
        #note-display { font-size: 2em; font-weight: bold; color: #0f0; }
        #status { font-size: 0.8em; color: #aaa; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="note-display">--</div>
        <div id="status">대기 중...</div>
    </div>

    <div id="overlay">
        <h1>Spiral Sound 시작</h1>
        <p>피아노 음을 입체 도형으로 확인하세요.</p>
        <button id="start-btn">시작하기 (마이크 허용)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pitchfinder@2.3.0/dist/pitchfinder.min.js"></script>

    <script>
        let scene, camera, renderer, controls, audioContext, analyser, pitchDetector;
        let isRunning = false;
        const notePoints = [];
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
        const MAX_OCTAVE = 8;
        const BOTTOM_RADIUS = 5;
        const HEIGHT_STEP = 2;

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.015);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            // 가이드 고깔
            const geometry = new THREE.CylinderGeometry(0.1, BOTTOM_RADIUS, MAX_OCTAVE * HEIGHT_STEP, 12, MAX_OCTAVE, true);
            const material = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true, transparent: true, opacity: 0.2 });
            const cone = new THREE.Mesh(geometry, material);
            cone.position.y = (MAX_OCTAVE * HEIGHT_STEP) / 2;
            scene.add(cone);
            
            scene.add(new THREE.AmbientLight(0x404040));
            const pl = new THREE.PointLight(0xffffff, 1);
            pl.position.set(10, 20, 10);
            scene.add(pl);
        }

        async function startApp() {
            const statusEl = document.getElementById('status');
            try {
                // 1. 오디오 컨텍스트 먼저 생성 (사용자 상호작용 내에서)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 2. 마이크 권한 요청
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 3. UI 제거 및 엔진 시작
                document.getElementById('overlay').style.display = 'none';
                isRunning = true;
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                pitchDetector = pitchfinder.YIN({ sampleRate: audioContext.sampleRate });

                statusEl.innerText = "분석 중...";
                initThree();
                animate();
                updateAudio();
            } catch (err) {
                console.error(err);
                statusEl.innerText = "에러: " + err.name + ". 주소를 복사해 Chrome/Safari에서 열어주세요.";
                statusEl.style.color = "red";
            }
        }

        function updateAudio() {
            if (!isRunning) return;
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            const pitch = pitchDetector(buffer);

            if (pitch) {
                const midi = Math.round(12 * Math.log2(pitch / 440) + 69);
                let sum = 0;
                for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
                const rms = Math.sqrt(sum / buffer.length);

                if (rms > 0.01) {
                    const octave = Math.floor(midi / 12) - 1;
                    const noteIdx = midi % 12;
                    if (octave >= 0 && octave <= MAX_OCTAVE) {
                        document.getElementById('note-display').innerText = NOTE_NAMES[noteIdx] + octave;
                        const fifthIdx = CIRCLE_OF_FIFTHS.indexOf(noteIdx);
                        const angle = (fifthIdx * 30) * (Math.PI / 180);
                        const radius = BOTTOM_RADIUS * (1 - (octave / MAX_OCTAVE) * 0.9);
                        addPoint(radius * Math.sin(angle), octave * HEIGHT_STEP, radius * Math.cos(angle), noteIdx, rms);
                    }
                }
            }
            requestAnimationFrame(updateAudio);
        }

        function addPoint(x, y, z, idx, vol) {
            const geo = new THREE.SphereGeometry(Math.max(0.1, vol * 2), 16, 16);
            const mat = new THREE.MeshPhongMaterial({ color: new THREE.Color().setHSL(idx / 12, 1, 0.5), transparent: true, opacity: 1 });
            const s = new THREE.Mesh(geo, mat);
            s.position.set(x, y, z);
            scene.add(s);
            notePoints.push({ mesh: s, mat: mat, start: performance.now() });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const now = performance.now();
            for (let i = notePoints.length - 1; i >= 0; i--) {
                const p = notePoints[i];
                const elapsed = now - p.start;
                if (elapsed > 3000) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    notePoints.splice(i, 1);
                } else if (elapsed > 2000) {
                    p.mat.opacity = (3000 - elapsed) / 1000;
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', startApp);
        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
