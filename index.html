<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SparalSound - Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 10; border: 1px solid #333; pointer-events: none; }
        #note-display { font-size: 2.5em; font-weight: bold; color: #00f2ff; }
        #status { font-size: 0.9em; color: #ffeb3b; margin-top: 5px; }
        #meter { font-size: 0.8em; color: #888; margin-top: 5px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { padding: 20px 40px; font-size: 1.5em; cursor: pointer; background: #00f2ff; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="note-display">--</div>
        <div id="status">연결됨</div>
        <div id="meter">볼륨: 0.0000</div>
    </div>

    <div id="overlay">
        <h1>SPARAL SOUND</h1>
        <p>마이크 테스트 성공! 이제 시작합니다.</p>
        <button id="start-btn">고깔 시각화 시작</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pitchfinder@2.3.0/dist/pitchfinder.min.js"></script>

    <script>
        let scene, camera, renderer, controls, analyser, pitchDetector;
        let isRunning = false;
        const notePoints = [];
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];

        async function startApp() {
            try {
                // 1. 오디오 엔진 시작 (성공했던 로직)
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                
                // 2. 음정 감지기 설정
                if (typeof pitchfinder !== 'undefined') {
                    pitchDetector = pitchfinder.YIN({ sampleRate: audioContext.sampleRate });
                }

                // 3. UI 숨기기 및 3D 시작
                document.getElementById('overlay').style.display = 'none';
                initThree();
                isRunning = true;
                
                updateLoop();
            } catch (err) {
                alert("시작 중 오류: " + err.message);
            }
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 20, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 10, 0);

            // 고깔 가이드
            const geometry = new THREE.CylinderGeometry(0.2, 7, 24, 12, 8, true);
            const material = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true, transparent: true, opacity: 0.3 });
            const cone = new THREE.Mesh(geometry, material);
            cone.position.y = 12;
            scene.add(cone);
            scene.add(new THREE.GridHelper(30, 10, 0x222222, 0x111111));
        }

        function updateLoop() {
            if (!isRunning) return;
            
            // 소리 분석 (성공했던 로직)
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            
            let sum = 0;
            for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
            const rms = Math.sqrt(sum / buffer.length);
            document.getElementById('meter').innerText = "볼륨: " + rms.toFixed(4);

            if (rms > 0.015 && pitchDetector) {
                const pitch = pitchDetector(buffer);
                if (pitch) {
                    const midi = Math.round(12 * Math.log2(pitch / 440) + 69);
                    const octave = Math.floor(midi / 12) - 1;
                    const noteIdx = midi % 12;

                    if (octave >= 0 && octave <= 8) {
                        document.getElementById('note-display').innerText = NOTE_NAMES[noteIdx] + octave;
                        
                        // 좌표 계산 및 점 추가
                        const fifthIdx = CIRCLE_OF_FIFTHS.indexOf(noteIdx);
                        const angle = (fifthIdx * 30) * (Math.PI / 180);
                        const radius = 7 * (1 - (octave / 9) * 0.9);
                        addPoint(radius * Math.sin(angle), octave * 3, radius * Math.cos(angle), noteIdx);
                    }
                }
            }

            // 3D 렌더링
            const now = performance.now();
            for (let i = notePoints.length - 1; i >= 0; i--) {
                if (now - notePoints[i].start > 3000) {
                    scene.remove(notePoints[i].mesh);
                    notePoints.splice(i, 1);
                }
            }
            controls.update();
            renderer.render(scene, camera);
            
            requestAnimationFrame(updateLoop);
        }

        function addPoint(x, y, z, idx) {
            const geometry = new THREE.SphereGeometry(0.3, 8, 8);
            const color = new THREE.Color().setHSL(idx / 12, 1, 0.5);
            const material = new THREE.MeshBasicMaterial({ color: color });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            scene.add(sphere);
            notePoints.push({ mesh: sphere, start: performance.now() });
        }

        document.getElementById('start-btn').onclick = startApp;
    </script>
</body>
</html>
