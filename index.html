<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SparalSound - Neon Tuner</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-glow: 0 0 10px rgba(0, 242, 255, 0.7), 0 0 20px rgba(0, 242, 255, 0.5), 0 0 30px rgba(0, 242, 255, 0.3);
            --bg-dark: #000205;
        }

        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--bg-dark); color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            touch-action: none;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        /* 메인 컨테이너 */
        #app {
            text-align: center;
            width: 100%; max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            display: none; /* 마이크 시작 전엔 숨김 */
        }

        /* 음표 디스플레이 */
        #note {
            font-size: 10em; font-weight: 900;
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
            margin: 0; line-height: 1;
            transition: transform 0.1s ease-out; /* 음정 바뀔 때 튕기는 효과 */
        }

        /* 주파수 및 옥타브 디스플레이 */
        #freq {
            font-size: 1.8em; color: #aaa;
            margin-top: -10px; font-weight: 300;
            letter-spacing: 1px;
        }

        /* 소리 크기에 반응하는 원형 게이지 */
        #volume-ring {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.1);
            margin: 40px auto;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.05s linear; /* 부드러운 반응 */
            box-shadow: inset var(--neon-glow);
        }
        
        #volume-ring-inner {
            width: 80%; height: 80%;
            border-radius: 50%;
            border: 1px solid var(--neon-blue);
            opacity: 0.2;
            box-shadow: var(--neon-glow);
        }

        /* 시작 오버레이 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #00101a 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
            transition: opacity 0.5s ease;
        }

        h1 {
            font-size: 2.5em; font-weight: 800;
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p { color: #8a99a8; margin-bottom: 40px; font-weight: 300; }

        button {
            padding: 22px 50px; font-size: 1.3em; cursor: pointer;
            background: transparent; color: var(--neon-blue);
            border: 2px solid var(--neon-blue); border-radius: 10px;
            font-weight: bold; transition: all 0.3s;
            box-shadow: var(--neon-glow);
        }

        button:hover {
            background: rgba(0, 242, 255, 0.1);
            transform: scale(1.05);
        }

        /* 하단 로고 */
        #logo {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            text-align: center; color: #333; font-size: 0.8em; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="volume-ring">
            <div id="volume-ring-inner"></div>
        </div>
        <p id="note">--</p>
        <p id="freq">0.00 Hz</p>
    </div>

    <div id="overlay">
        <h1>SPARAL SOUND</h1>
        <p>The Geometry of Pure Harmonics</p>
        <button id="start-btn">SYSTEM START</button>
    </div>

    <div id="logo">SPARAL SOUND</div>

    <script>
        const appEl = document.getElementById('app');
        const overlayEl = document.getElementById('overlay');
        const noteEl = document.getElementById('note');
        const freqEl = document.getElementById('freq');
        const ringEl = document.getElementById('volume-ring');
        const btn = document.getElementById('start-btn');

        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        let lastNote = "";

        // [내장 엔진] 음정 분석 알고리즘 ( Autocorrelation )
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; // 소리가 너무 작음

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;

            let c = new Float32Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            let T0 = maxpos;
            return sampleRate / T0;
        }

        async function startApp() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                const buffer = new Float32Array(analyser.fftSize);

                // UI 전환 애니메이션
                overlayEl.style.opacity = '0';
                setTimeout(() => {
                    overlayEl.style.display = 'none';
                    appEl.style.display = 'block';
                }, 500);

                function update() {
                    analyser.getFloatTimeDomainData(buffer);
                    
                    // 소리 크기 계산 및 원형 게이지 애니메이션
                    let sum = 0;
                    for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
                    const rms = Math.sqrt(sum / buffer.length);
                    
                    // 볼륨에 따라 원이 커졌다 작아졌다 함 (최소 0.8배, 최대 1.3배)
                    const scale = 0.8 + Math.min(rms * 1.5, 0.5); 
                    ringEl.style.transform = `scale(${scale})`;
                    ringEl.style.borderColor = `rgba(0, 242, 255, ${0.1 + rms * 2})`; // 소리 클수록 원 테두리가 선명해짐

                    // 음정 감지
                    const pitch = autoCorrelate(buffer, audioContext.sampleRate);

                    if (pitch !== -1 && pitch < 3000) { 
                        const midi = Math.round(12 * Math.log2(pitch / 440) + 69);
                        if (midi > 0 && midi < 128) {
                            const noteName = NOTE_NAMES[midi % 12];
                            const octave = Math.floor(midi / 12) - 1;
                            const currentNote = noteName + octave;
                            
                            // 음정이 바뀔 때만 글자를 튕겨줌 (애니메이션)
                            if (currentNote !== lastNote) {
                                noteEl.style.transform = "scale(1.1)";
                                setTimeout(() => noteEl.style.transform = "scale(1)", 50);
                                lastNote = currentNote;
                            }
                            
                            noteEl.innerText = currentNote;
                            freqEl.innerText = pitch.toFixed(2) + " Hz";
                        }
                    } else {
                        // 소리가 없을 땐 서서히 원래대로
                        if (rms < 0.005) {
                            ringEl.style.transform = "scale(0.8)";
                            ringEl.style.borderColor = "rgba(0, 242, 255, 0.1)";
                        }
                    }
                    requestAnimationFrame(update);
                }
                update();
            } catch (err) {
                alert("오류: " + err.message + ". 마이크 권한을 허용해주세요.");
            }
        }

        btn.onclick = startApp;
    </script>
</body>
</html>
