<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spiral Sound - 8 Octave</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; pointer-events: none; z-index: 10; }
        #note-display { font-size: 2.5em; font-weight: bold; color: #0f0; }
        #status { font-size: 0.9em; color: #aaa; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        h1 { margin-bottom: 10px; color: #2196F3; }
        p { margin-bottom: 30px; line-height: 1.5; color: #ccc; }
        button { padding: 20px 40px; font-size: 1.4em; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4); font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="note-display">--</div>
        <div id="status">연결 대기 중...</div>
    </div>

    <div id="overlay">
        <h1>Spiral Sound</h1>
        <p>8옥타브 5도권 고깔 시각화<br>피아노 소리를 입체 도형으로 확인하세요.</p>
        <button id="start-btn">시작하기</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pitchfinder@2.3.0/dist/pitchfinder.min.js"></script>

    <script>
        let scene, camera, renderer, controls, audioContext, analyser, pitchDetector;
        let isRunning = false;
        const notePoints = [];
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
        const MAX_OCTAVE = 8;
        const BOTTOM_RADIUS = 6;
        const HEIGHT_STEP = 2.5;

        function initThree() {
            scene = new THREE.Scene();
            // 배경 안개 농도 완화 (0.012 -> 0.008)
            scene.fog = new THREE.FogExp2(0x000000, 0.008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 25); // 카메라를 조금 더 멀리서 잡음

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 8, 0);

            // 고깔 가이드라인 강화 (색상 0x333333 -> 0x888888, 투명도 0.15 -> 0.4)
            const geometry = new THREE.CylinderGeometry(0.2, BOTTOM_RADIUS, MAX_OCTAVE * HEIGHT_STEP, 12, MAX_OCTAVE, true);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x888888, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.4 
            });
            const cone = new THREE.Mesh(geometry, material);
            cone.position.y = (MAX_OCTAVE * HEIGHT_STEP) / 2;
            scene.add(cone);

            // 바닥 그리드 추가 (공간감 확보)
            const gridHelper = new THREE.GridHelper(20, 10, 0x444444, 0x222222);
            scene.add(gridHelper);

            scene.add(new THREE.AmbientLight(0x606060));
            const pl = new THREE.PointLight(0xffffff, 1.5);
            pl.position.set(15, 30, 15);
            scene.add(pl);
        }

        async function startApp() {
            const statusEl = document.getElementById('status');
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') await audioContext.resume();

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });

                document.getElementById('overlay').style.display = 'none';
                isRunning = true;

                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                pitchDetector = pitchfinder.YIN({ sampleRate: audioContext.sampleRate });

                statusEl.innerText = "sparalsound 분석 중...";
                initThree();
                animate();
                updateAudio();
            } catch (err) {
                console.error(err);
                document.getElementById('overlay').style.display = 'none';
                isRunning = true;
                initThree();
                animate();
                updateAudio();
            }
        }

        function updateAudio() {
            if (!isRunning || !analyser) return;
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            
            let sum = 0;
            for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
            const rms = Math.sqrt(sum / buffer.length);

            if (rms > 0.012) { // 감도 살짝 상향
                const pitch = pitchDetector(buffer);
                if (pitch) {
                    const midi = Math.round(12 * Math.log2(pitch / 440) + 69);
                    const octave = Math.floor(midi / 12) - 1;
                    const noteIdx = midi % 12;

                    if (octave >= 0 && octave <= MAX_OCTAVE) {
                        document.getElementById('note-display').innerText = NOTE_NAMES[noteIdx] + octave;
                        const fifthIdx = CIRCLE_OF_FIFTHS.indexOf(noteIdx);
                        const angle = (fifthIdx * 30) * (Math.PI / 180);
                        const radius = BOTTOM_RADIUS * (1 - (octave / (MAX_OCTAVE + 1)) * 0.9);
                        
                        addPoint(radius * Math.sin(angle), octave * HEIGHT_STEP, radius * Math.cos(angle), noteIdx, rms);
                    }
                }
            }
            requestAnimationFrame(updateAudio);
        }

        function addPoint(x, y, z, idx, vol) {
            const size = Math.max(0.15, vol * 3.0);
            const geometry = new THREE.SphereGeometry(size, 16, 16);
            const color = new THREE.Color().setHSL(idx / 12, 1, 0.5);
            const material = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.6, transparent: true, opacity: 1 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            scene.add(sphere);

            notePoints.push({ mesh: sphere, mat: material, start: performance.now(), duration: 3000 });
        }

        function animate() {
            if (!isRunning) return;
            requestAnimationFrame(animate);
            controls.update();
            const now = performance.now();
            for (let i = notePoints.length - 1; i >= 0; i--) {
                const p = notePoints[i];
                const elapsed = now - p.start;
                if (elapsed > p.duration) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    notePoints.splice(i, 1);
                } else if (elapsed > 2000) {
                    p.mat.opacity = (p.duration - elapsed) / 1000;
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', startApp);
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
