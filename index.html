<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점유율 분석 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📊 플레이버별 시장 점유율(%)</h1>
                <p class="text-sm text-slate-500">해당 일자 전체 판매량 대비 비중 분석</p>
            </div>
            <div class="text-right text-xs text-slate-400">Data Source: Google Sheets</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Year</label>
                <select id="yearSelect" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" onchange="updateMonthOptions()">
                    <option value="">연도 선택</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Month</label>
                <select id="monthSelect" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" onchange="updateFlavorList()" disabled>
                    <option value="">월 선택</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Search Flavor</label>
                <input type="text" id="flavorSearch" placeholder="플레이버 검색..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-blue-500" oninput="renderFlavorList()">
                <div id="flavorList" class="h-44 overflow-y-auto border border-slate-100 rounded-lg p-1 space-y-1 text-sm">
                    <div class="text-center py-10 text-slate-300">조건을 선택하세요</div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="chartTitle" class="text-xl font-bold text-slate-800">-</h2>
                    <p id="subTitle" class="text-sm text-blue-500 font-medium mt-1">항목을 선택하면 비중 추이가 나타납니다</p>
                </div>
                <div class="text-right">
                    <span id="avgShare" class="text-3xl font-black text-slate-800">-</span>
                    <span class="text-slate-400 font-bold ml-1">%</span>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">월 평균 점유율</p>
                </div>
            </div>
            <div class="h-96 w-full">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk_3J6YWbjmWoWzOULkgWvICByjwVL6FGuZJSoBKtZBm3YlSeC1m6nKy3MSs7VdquYA4EKIoGZ1-Me/pub?gid=0&single=true&output=csv';
        
        let rawData = [];
        let filteredByMonth = [];
        let dailyTotals = []; // 특정 월의 일자별 전체 합계
        let myChart = null;

        async function init() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(','));
                
                rawData = rows.slice(1).filter(r => r[2]).map(r => ({
                    year: r[0].trim(),
                    month: r[1].trim(),
                    name: r[2].trim(),
                    daily: r.slice(3, 34).map(v => parseInt(v.replace(/[^0-9]/g, '')) || 0)
                }));

                const years = [...new Set(rawData.map(d => d.year))].sort();
                const yearSelect = document.getElementById('yearSelect');
                yearSelect.innerHTML = '<option value="">연도 선택</option>' + 
                    years.map(y => `<option value="${y}">${y}년</option>`).join('');

            } catch (err) {
                console.error(err);
            }
        }

        function updateMonthOptions() {
            const year = document.getElementById('yearSelect').value;
            const monthSelect = document.getElementById('monthSelect');
            if (!year) { monthSelect.disabled = true; return; }

            const months = [...new Set(rawData.filter(d => d.year === year).map(d => d.month))].sort((a,b) => a-b);
            monthSelect.innerHTML = '<option value="">월 선택</option>' + 
                months.map(m => `<option value="${m}">${m}월</option>`).join('');
            monthSelect.disabled = false;
        }

        function updateFlavorList() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            
            filteredByMonth = rawData.filter(d => d.year === year && d.month === month);

            // 해당 월의 일자별(1~31일) 전체 합계 계산 (비중 산출용)
            dailyTotals = Array(31).fill(0);
            filteredByMonth.forEach(item => {
                item.daily.forEach((val, i) => {
                    dailyTotals[i] += val;
                });
            });

            renderFlavorList();
        }

        function renderFlavorList() {
            const searchTerm = document.getElementById('flavorSearch').value.toLowerCase();
            const listContainer = document.getElementById('flavorList');
            const displayList = filteredByMonth.filter(item => item.name.toLowerCase().includes(searchTerm));

            listContainer.innerHTML = displayList.map(item => {
                const totalVal = item.daily.reduce((a,b) => a+b, 0);
                const monthGrandTotal = dailyTotals.reduce((a,b) => a+b, 0);
                const share = monthGrandTotal > 0 ? ((totalVal / monthGrandTotal) * 100).toFixed(1) : 0;

                return `
                <div onclick="drawChart('${item.name}')" class="flex justify-between items-center p-3 hover:bg-blue-50 cursor-pointer rounded-xl transition group">
                    <span class="font-medium text-slate-700 group-hover:text-blue-600">${item.name}</span>
                    <span class="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">${share}%</span>
                </div>`;
            }).join('');
        }

        function drawChart(flavorName) {
            const dataObj = filteredByMonth.find(d => d.name === flavorName);
            if (!dataObj) return;

            // 일별 비중(%) 계산
            const shareData = dataObj.daily.map((val, i) => {
                return dailyTotals[i] > 0 ? ((val / dailyTotals[i]) * 100).toFixed(2) : 0;
            });

            // 평균 비중 계산
            const avg = (shareData.reduce((a,b) => parseFloat(a)+parseFloat(b), 0) / 31).toFixed(2);
            
            document.getElementById('chartTitle').innerText = flavorName;
            document.getElementById('subTitle').innerText = "일자별 전체 판매량 대비 점유율 추이";
            document.getElementById('avgShare').innerText = avg;

            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 31}, (_, i) => `${i + 1}일`),
                    datasets: [{
                        label: '점유율(%)',
                        data: shareData,
                        borderColor: '#3b82f6',
                        borderWidth: 4,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#3b82f6',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (ctx) => ` 점유율: ${ctx.raw}%`
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            ticks: { callback: (value) => value + '%' },
                            grid: { color: '#f1f5f9' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
