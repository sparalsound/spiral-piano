<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chan-wook's Data Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .data-row:hover { background-color: #f8fafc; cursor: pointer; }
        .active-row { background-color: #eff6ff !important; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="max-w-6xl mx-auto py-10 px-4">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800">📊 실시간 판매 대시보드</h1>
            <p class="text-slate-500 text-sm">Google Sheets 실시간 연동</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50">
                    <h2 class="font-semibold text-slate-700">플레이버 리스트</h2>
                </div>
                <div class="overflow-y-auto h-[600px]">
                    <table class="w-full text-left text-sm">
                        <thead class="sticky top-0 bg-white shadow-sm">
                            <tr class="text-slate-400 uppercase text-[10px] tracking-wider">
                                <th class="p-4">플레이버</th>
                                <th class="p-4 text-right">총합</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr><td colspan="2" class="p-10 text-center text-slate-400">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="target-title" class="text-xl font-bold text-slate-800">항목을 선택하세요</h2>
                        <span id="target-total" class="text-blue-600 font-bold text-lg"></span>
                    </div>
                    <div class="h-[400px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-600 p-6 rounded-2xl text-white">
                        <p class="text-blue-100 text-xs uppercase tracking-widest mb-1">최고 수치</p>
                        <h3 id="stat-max" class="text-2xl font-bold">-</h3>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl text-white">
                        <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">일 평균</p>
                        <h3 id="stat-avg" class="text-2xl font-bold">-</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk_3J6YWbjmWoWzOULkgWvICByjwVL6FGuZJSoBKtZBm3YlSeC1m6nKy3MSs7VdquYA4EKIoGZ1-Me/pub?gid=0&single=true&output=csv';
        let chartInstance = null;
        let globalData = [];

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').map(row => row.split(','));
                
                // 데이터 파싱 (시트 구조: 년, 월, 플레이버, 1, 2... 31)
                globalData = rows.slice(1)
                    .filter(row => row[2]) // 플레이버 이름이 있는 경우만
                    .map((row, index) => {
                        const dailyValues = row.slice(3, 34).map(v => {
                            const num = parseInt(v.replace(/[^0-9]/g, ''));
                            return isNaN(num) ? 0 : num;
                        });
                        return {
                            id: index,
                            name: row[2].trim(),
                            daily: dailyValues,
                            total: dailyValues.reduce((a, b) => a + b, 0)
                        };
                    })
                    .sort((a, b) => b.total - a.total); // 총합 기준 내림차순 정렬

                renderTable();
                if(globalData.length > 0) selectRow(0); // 첫 번째 항목 자동 선택

            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="2" class="p-10 text-center text-red-500">데이터 로드 실패</td></tr>`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = globalData.map(item => `
                <tr class="data-row border-b border-slate-50" id="row-${item.id}" onclick="selectRow(${item.id})">
                    <td class="p-4 font-medium text-slate-700">${item.name}</td>
                    <td class="p-4 text-right text-slate-500 font-mono">${item.total.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function selectRow(id) {
            const item = globalData.find(d => d.id === id);
            if(!item) return;

            // UI 업데이트
            document.querySelectorAll('.data-row').forEach(r => r.classList.remove('active-row'));
            document.getElementById(`row-${id}`).classList.add('active-row');
            document.getElementById('target-title').innerText = item.name;
            document.getElementById('target-total').innerText = `Total: ${item.total.toLocaleString()}`;
            
            // 통계 업데이트
            document.getElementById('stat-max').innerText = Math.max(...item.daily).toLocaleString();
            document.getElementById('stat-avg').innerText = Math.round(item.total / 31).toLocaleString();

            updateChart(item);
        }

        function updateChart(item) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 31}, (_, i) => `${i + 1}일`),
                    datasets: [{
                        label: '일별 수치',
                        data: item.daily,
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        backgroundColor: (context) => {
                            const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
                            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
                            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
                            return gradient;
                        },
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [5, 5] } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
