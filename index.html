<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SparalSound - Stable</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 10; border: 1px solid #333; pointer-events: none; }
        #note-display { font-size: 2.5em; font-weight: bold; color: #00f2ff; }
        #status { font-size: 0.9em; color: #ffeb3b; margin-top: 5px; }
        #volume-meter { font-size: 0.8em; color: #888; margin-top: 5px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { padding: 20px 40px; font-size: 1.4em; cursor: pointer; background: #00f2ff; color: #000; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="note-display">--</div>
        <div id="status">대기 중...</div>
        <div id="volume-meter">SIGNAL: 0.0000</div>
    </div>

    <div id="overlay">
        <h1 style="color:#00f2ff">SPARAL SOUND</h1>
        <p>피아노 소리를 입체로 시각화합니다.</p>
        <button id="start-btn">시작하기</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pitchfinder@2.3.0/dist/pitchfinder.min.js"></script>

    <script>
        let scene, camera, renderer, controls, audioContext, analyser, pitchDetector;
        let isRunning = false;
        const notePoints = [];
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
        const MAX_OCTAVE = 8;
        const BOTTOM_RADIUS = 7;
        const HEIGHT_STEP = 3;

        // [핵심] 페이지 로드 즉시 3D 화면부터 생성
        initThree();
        animate();

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 20, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 10, 0);

            // 고깔 가이드라인 (가장 가벼운 소재로 변경)
            const geometry = new THREE.CylinderGeometry(0.2, BOTTOM_RADIUS, MAX_OCTAVE * HEIGHT_STEP, 12, MAX_OCTAVE, true);
            const material = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true, transparent: true, opacity: 0.5 });
            const cone = new THREE.Mesh(geometry, material);
            cone.position.y = (MAX_OCTAVE * HEIGHT_STEP) / 2;
            scene.add(cone);
            
            // 바닥 그리드
            scene.add(new THREE.GridHelper(30, 10, 0x222222, 0x111111));
        }

        async function startApp() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                await audioContext.resume();

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                document.getElementById('overlay').style.display = 'none';
                isRunning = true;

                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                audioContext.createMediaStreamSource(stream).connect(analyser);
                pitchDetector = pitchfinder.YIN({ sampleRate: audioContext.sampleRate });

                document.getElementById('status').innerText = "마이크 작동 중";
                updateAudio();
            } catch (err) {
                alert("마이크를 허용해주세요! " + err.name);
                document.getElementById('status').innerText = "마이크 연결 필요";
            }
        }

        function updateAudio() {
            if (!isRunning || !analyser) return;
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            
            let sum = 0;
            for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
            const rms = Math.sqrt(sum / buffer.length);

            document.getElementById('volume-meter').innerText = "SIGNAL: " + rms.toFixed(4);

            if (rms > 0.01) {
                const pitch = pitchDetector(buffer);
                if (pitch) {
                    const midi = Math.round(12 * Math.log2(pitch / 440) + 69);
                    const octave = Math.floor(midi / 12) - 1;
                    const noteIdx = midi % 12;

                    if (octave >= 0 && octave <= MAX_OCTAVE) {
                        document.getElementById('note-display').innerText = NOTE_NAMES[noteIdx] + octave;
                        const fifthIdx = CIRCLE_OF_FIFTHS.indexOf(noteIdx);
                        const angle = (fifthIdx * 30) * (Math.PI / 180);
                        const radius = BOTTOM_RADIUS * (1 - (octave / (MAX_OCTAVE + 1)) * 0.9);
                        addPoint(radius * Math.sin(angle), octave * HEIGHT_STEP, radius * Math.cos(angle), noteIdx, rms);
                    }
                }
            }
            requestAnimationFrame(updateAudio);
        }

        function addPoint(x, y, z, idx, vol) {
            const size = Math.max(0.2, vol * 6.0);
            const geometry = new THREE.SphereGeometry(size, 8, 8); // 성능을 위해 구체 해상도 낮춤
            const color = new THREE.Color().setHSL(idx / 12, 1, 0.5);
            const material = new THREE.MeshBasicMaterial({ color: color });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            scene.add(sphere);
            notePoints.push({ mesh: sphere, start: performance.now() });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            
            const now = performance.now();
            for (let i = notePoints.length - 1; i >= 0; i--) {
                if (now - notePoints[i].start > 3000) {
                    scene.remove(notePoints[i].mesh);
                    notePoints.splice(i, 1);
                }
            }
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', startApp);
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
