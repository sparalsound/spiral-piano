<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SparalSound - Spiral 3D</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000205; }
        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: sans-serif; touch-action: none; }
        
        /* 상단 고정 튜너 디자인 */
        #ui-tuner {
            position: absolute; top: 20px; left: 0; width: 100%;
            text-align: center; z-index: 10; pointer-events: none;
        }
        #note {
            font-size: 5.5em; font-weight: 900; color: var(--neon);
            text-shadow: 0 0 20px var(--neon); margin: 0;
        }
        #volume-ring {
            width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.2); margin: 0 auto;
            transition: transform 0.05s linear;
        }

        /* 3D 렌더링 영역 */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 시작 버튼 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        button {
            padding: 20px 50px; font-size: 1.5em; cursor: pointer;
            background: var(--neon); border: none; border-radius: 50px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-tuner" style="display:none;">
        <div id="volume-ring"></div>
        <p id="note">--</p>
    </div>

    <div id="overlay">
        <h1 style="color:var(--neon)">SPARAL SOUND</h1>
        <p>8-Octave Spiral System</p>
        <button id="start-btn">START</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
        
        let scene, camera, renderer, controls, analyser, buffer, isRunning = false;
        const notePoints = [];

        // 음정 분석 엔진 (성공했던 로직)
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length, rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return { rms, pitch: -1 };

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            buf = buf.slice(r1, r2);
            SIZE = buf.length;

            let c = new Float32Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            return { rms, pitch: sampleRate / maxpos };
        }

        // 3D 초기화
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(12, 15, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 8, 0);

            // 가이드 고깔 및 바닥
            const cone = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 8, 30, 12, 8, true),
                new THREE.MeshBasicMaterial({ color: 0x222222, wireframe: true, transparent: true, opacity: 0.2 })
            );
            cone.position.y = 15;
            scene.add(cone);
            scene.add(new THREE.GridHelper(40, 10, 0x111111, 0x111111));
        }

        function addPoint(x, y, z, noteIdx, vol) {
            const color = new THREE.Color().setHSL(CIRCLE_OF_FIFTHS.indexOf(noteIdx) / 12, 1, 0.5);
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(Math.max(0.2, vol * 6), 8, 8),
                new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 })
            );
            sphere.position.set(x, y, z);
            scene.add(sphere);
            notePoints.push({ mesh: sphere, start: performance.now() });
        }

        function animate() {
            if (!isRunning) return;
            requestAnimationFrame(animate);

            analyser.getFloatTimeDomainData(buffer);
            const res = autoCorrelate(buffer, audioContext.sampleRate);
            
            // 상단 링 반응
            document.getElementById('volume-ring').style.transform = `scale(${0.8 + Math.min(res.rms * 2, 0.5)})`;

            if (res.pitch !== -1 && res.pitch < 4000) {
                const midi = Math.round(12 * Math.log2(res.pitch / 440) + 69);
                const noteIdx = midi % 12, octave = Math.floor(midi / 12) - 1;

                if (octave >= 0 && octave <= 8) {
                    document.getElementById('note').innerText = NOTE_NAMES[noteIdx] + octave;
                    const angle = (CIRCLE_OF_FIFTHS.indexOf(noteIdx) * 30) * (Math.PI / 180);
                    const radius = 8 * (1 - (octave / 10));
                    addPoint(radius * Math.sin(angle), octave * 3.5, radius * Math.cos(angle), noteIdx, res.rms);
                }
            }

            // 점 소멸 로직
            const now = performance.now();
            for (let i = notePoints.length - 1; i >= 0; i--) {
                if (now - notePoints[i].start > 2500) {
                    scene.remove(notePoints[i].mesh);
                    notePoints.splice(i, 1);
                }
            }
            controls.update();
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = async () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            analyser = ctx.createAnalyser();
            analyser.fftSize = 2048;
            ctx.createMediaStreamSource(stream).connect(analyser);
            buffer = new Float32Array(analyser.fftSize);
            audioContext = ctx;

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui-tuner').style.display = 'block';
            initThree();
            isRunning = true;
            animate();
        };
    </script>
</body>
</html>
